<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 200px;
            padding: 10px;
            font-family: sans-serif;
        }

        h2 {
            color: #ff6b00;
            font-size: 16px;
            margin-top: 0;
        }

        p {
            font-size: 12px;
            line-height: 1.4;
        }

        .status {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h2>JPD Helper</h2>
    <p>Trạng thái: <span class="status">Đang chạy</span></p>
    <p>1. Tự động tìm và hiện đáp án khi làm bài.</p>
    <p>2. Nhấn <b>F1</b> để hiện/ẩn bong bóng chat.</p>
    <p>3. Nhấn <b>C</b> để copy đáp án.</p>
    <hr>
    <p style="font-size: 10px; color: #888;">Kéo thả bong bóng đến vị trí thuận tiện nhất.</p>
</body>

</html>
